# Model Configuration
model:
  name: 'DenseNet121'
  pretrained: true
  model_type: 'multi_task'
  num_classes: 2
  severity_classes: 4

# Training Configuration
training:
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 50
  early_stopping_patience: 10
  lr_scheduler: 'cosine'
  mixed_precision: true
  weight_decay: 0.0001
  gradient_clip_max_norm: 1.0
  
  # Multi-task learning weights
  loss_weights:
    binary_classification: 0.6
    severity_prediction: 0.4

# Data Configuration
data:
  data_dir: 'data/processed/'
  csv_file: 'data/metadata.csv'
  image_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  num_workers: 4
  augment_train: true
  seed: 42

# Directory Paths
paths:
  checkpoint_dir: 'checkpoints/'
  log_dir: 'logs/'
  output_dir: 'outputs/'

# Evaluation Configuration
evaluation:
  eval_freq: 1
  save_best_metric: 'val_f1'
  compute_class_weights: true
