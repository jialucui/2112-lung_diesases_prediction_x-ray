<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chest X-ray — pneumonia type & severity (assistive)</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d9dff;
      --ok: #3ecf8e;
      --warn: #f5a623;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a2a44, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.35rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 1.25rem 1.35rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .drop {
      border: 2px dashed rgba(61,157,255,.45);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop:hover, .drop.dragover {
      border-color: var(--accent);
      background: rgba(61,157,255,.06);
    }
    .drop input { display: none; }
    .preview {
      margin-top: 1rem;
      max-width: 100%;
      max-height: 240px;
      border-radius: 8px;
      display: none;
    }
    .preview.show { display: block; margin-left: auto; margin-right: auto; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #2d7edb, var(--accent));
      color: #fff;
      cursor: pointer;
      opacity: 1;
    }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .err { color: #ff6b6b; font-size: 0.9rem; margin-top: .75rem; white-space: pre-wrap; }
    .bar-row { margin: .45rem 0; }
    .bar-label { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: .2rem; }
    .bar-track {
      height: 10px;
      border-radius: 6px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #2d7edb, var(--accent));
      transition: width .35s ease;
    }
    .pill {
      display: inline-block;
      padding: .2rem .55rem;
      border-radius: 999px;
      font-size: .78rem;
      background: rgba(62,207,142,.15);
      color: var(--ok);
      margin-left: .35rem;
    }
    .disclaimer {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    pre.report {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
      margin: .75rem 0 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pneumonia type &amp; severity</h1>
    <p class="sub">Upload a chest image (JPG / PNG) to see class probabilities and a severity estimate. For research or education only — not for diagnosis.</p>

    <div class="card">
      <label class="drop" id="dropZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg" />
        <div id="dropText">Click to choose a file or drag and drop here</div>
        <img id="preview" class="preview" alt="Preview" />
      </label>
      <button type="button" id="btn" disabled>Run analysis</button>
      <div class="err" id="err"></div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem;">
        <strong>Prediction</strong>
        <span id="predClass"></span>
        <span class="pill" id="modelTag"></span>
      </div>
      <h2 style="font-size:1rem;margin:0 0 .6rem;color:var(--muted);font-weight:500;">Class probabilities</h2>
      <div id="classBars"></div>
      <h2 style="font-size:1rem;margin:1rem 0 .6rem;color:var(--muted);font-weight:500;">Severity</h2>
      <div id="sevBlock"></div>
      <p class="disclaimer" id="sevNote"></p>
      <details style="margin-top:.75rem;">
        <summary style="cursor:pointer;color:var(--muted);font-size:.85rem;">Full text report</summary>
        <pre class="report" id="reportText"></pre>
      </details>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const dropText = document.getElementById("dropText");
    const preview = document.getElementById("preview");
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");
    const resultCard = document.getElementById("resultCard");
    let currentFile = null;

    function setFile(file) {
      if (!file) return;
      if (!/^image\/(jpeg|png|jpg)$/i.test(file.type) && !/\.(jpe?g|png)$/i.test(file.name)) {
        err.textContent = "Please use a JPG or PNG image.";
        return;
      }
      err.textContent = "";
      currentFile = file;
      btn.disabled = false;
      dropText.textContent = file.name;
      const url = URL.createObjectURL(file);
      preview.src = url;
      preview.classList.add("show");
      resultCard.style.display = "none";
    }

    fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
    dropZone.addEventListener("click", () => fileInput.click());
    ["dragenter", "dragover"].forEach((ev) => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    });
    ["dragleave", "drop"].forEach((ev) => {
      dropZone.addEventListener(ev, (e) => { e.preventDefault(); dropZone.classList.remove("dragover"); });
    });
    dropZone.addEventListener("drop", (e) => {
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    function barHtml(label, p) {
      const pct = (p * 100).toFixed(1);
      return `
        <div class="bar-row">
          <div class="bar-label"><span>${label}</span><span>${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    }

    btn.addEventListener("click", async () => {
      if (!currentFile) return;
      err.textContent = "";
      btn.disabled = true;
      btn.textContent = "Analyzing…";
      resultCard.style.display = "none";

      const fd = new FormData();
      fd.append("file", currentFile, currentFile.name);

      try {
        const res = await fetch("/api/v1/predict", { method: "POST", body: fd });
        const data = await res.json();
        if (!res.ok) {
          const d = data.detail;
          err.textContent =
            typeof d === "string" ? d : Array.isArray(d) ? d.map((x) => x.msg || x).join("\n") : JSON.stringify(data);
          return;
        }

        document.getElementById("predClass").textContent = data.predicted_class || "—";
        document.getElementById("modelTag").textContent =
          data.model_type === "multi_task"
            ? "Multi-task (class + severity)"
            : "Classification only (severity is approximate)";

        const probs = data.class_probabilities || {};
        document.getElementById("classBars").innerHTML = Object.entries(probs)
          .map(([k, v]) => barHtml(k, v))
          .join("");

        const sev = document.getElementById("sevBlock");
        const note = document.getElementById("sevNote");
        note.textContent = "";

        if (data.severity_bin_probabilities && Object.keys(data.severity_bin_probabilities).length) {
          sev.innerHTML =
            `<p style="margin:.3rem 0 .6rem;">Blended severity ~ <strong style="color:var(--accent);font-size:1.15rem;">${data.severity_estimated_percent ?? "—"}%</strong></p>` +
            Object.entries(data.severity_bin_probabilities).map(([k, v]) => barHtml(k, v)).join("");
          if (data.severity_interpretation) {
            note.textContent = data.severity_interpretation;
          }
        } else {
          sev.innerHTML =
            `<p style="margin:.3rem 0;">Estimated severity ~ <strong style="color:var(--accent);font-size:1.15rem;">${data.severity_estimated_percent ?? "—"}%</strong></p>`;
          note.textContent =
            data.severity_note ||
            "With a classification-only checkpoint, severity is a rough estimate from non-normal probability.";
        }

        document.getElementById("reportText").textContent = data.report || "";
        resultCard.style.display = "block";
      } catch (e) {
        err.textContent = String(e);
      } finally {
        btn.disabled = false;
        btn.textContent = "Run analysis";
      }
    });
  </script>
</body>
</html>
