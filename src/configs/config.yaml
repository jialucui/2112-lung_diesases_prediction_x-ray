# Model Configuration
model:
  model_type: multi_task  # 'binary' 或 'multi_task'
  name: densenet121
  num_classes: 3  # 肺炎类型数量
  severity_classes: 5  # 严重程度分档
  pretrained: true

# Data Configuration
data:
  data_dir: pneumonia/  # 训练数据目录
  csv_file: null  # CSV 文件（可选）
  image_size: 224
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  augment_train: true
  num_workers: 4
  seed: 42

# Training Configuration
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1e-5
  num_epochs: 50
  early_stopping_patience: 10
  gradient_clip_max_norm: 1.0
  mixed_precision: true
  loss_weights:
    classification: 0.6
    binary_classification: 0.6
    severity_prediction: 0.4

# Evaluation Configuration
evaluation:
  eval_freq: 5  # 每 5 个 epoch 评估一次

# Paths
paths:
  checkpoint_dir: checkpoints/
  log_dir: logs/
  output_dir: outputs/

# Inference Configuration
inference:
  class_display_names:
    - Normal
    - Virus Pneumonia
    - Bacteria Pneumonia
  severity_bin_centers: [10, 30, 50, 70, 90]
  