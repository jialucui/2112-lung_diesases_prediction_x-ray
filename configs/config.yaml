model_type: binary

paths:
  training_data: /data/training/
  validation_data: /data/validation/
  test_data: /data/test/

training_parameters:
  batch_size: 32
  learning_rate: 0.001
  epochs: 50
  early_stopping:
    enabled: true
    patience: 5

inference_settings:
  save_model: true
  model_path: /models/pneumonia_detection_model.h5